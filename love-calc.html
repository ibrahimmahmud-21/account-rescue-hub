<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Love Calculator</title><link rel="stylesheet" href="../style.css"></head><body>
<div class="tool-page">
<h1>❤️ Love Calculator</h1>
<label>Your Name</label><input type="text" id="n1" placeholder="e.g. Ibrahim">
<label>Partner Name</label><input type="text" id="n2" placeholder="e.g. Sara">
<div class="btn-row"><button class="btn" onclick="calc()">Calculate Love</button><button class="btn btn-back" onclick="location.href='../index.html'">← Back</button></div>
<div class="output" id="out" style="text-align:center;font-size:1.1rem"></div>
</div>
<script>
function calc(){
  const a=document.getElementById('n1').value.trim();
  const b=document.getElementById('n2').value.trim();
  if(!a||!b){alert('Enter both names');return}
  let hash=0;for(const c of(a+b).toLowerCase()){hash=((hash<<5)-hash)+c.charCodeAt(0);hash|=0}
  const pct=Math.abs(hash)%101;
  let msg;
  if(pct>90)msg='💖 Perfect match! Made for each other!';
  else if(pct>70)msg='❤️ Great chemistry! Very compatible!';
  else if(pct>50)msg='💕 Good vibes! There\'s potential!';
  else if(pct>30)msg='💛 It could work with effort!';
  else msg='💔 Not the best match... but never say never!';
  document.getElementById('out').innerHTML=`<div style="font-size:2.5rem;color:#00ffcc;margin:10px 0">${pct}%</div><div>${a} ❤️ ${b}</div><div style="margin-top:8px;color:#aaa">${msg}</div>`;
}
</script></body></html>
