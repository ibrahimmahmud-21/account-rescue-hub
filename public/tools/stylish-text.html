<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stylish Text + Emoji</title><link rel="stylesheet" href="style.css"></head><body>
<div class="tool-page">
<h1>🎨 Stylish Text + Emoji Maker</h1>
<label>Enter text</label><input type="text" id="txt" placeholder="Hello World">
<div class="btn-row"><button class="btn" onclick="make()">Convert</button><button class="btn btn-back" onclick="location.href='index.html'">← Back</button></div>
<div class="output" id="out"></div>
<button class="btn btn-copy btn-sm" onclick="copyText('out')" style="margin-top:8px">Copy</button>
</div>
<script src="script.js"></script>
<script>
function toStyle(t,offset){return t.split('').map(c=>{const o=c.charCodeAt(0);if(o>=65&&o<=90)return String.fromCodePoint(o-65+offset);if(o>=97&&o<=122)return String.fromCodePoint(o-97+offset+26);return c}).join('')}
function make(){
  const t=document.getElementById('txt').value.trim();
  if(!t){alert('Enter text');return}
  const emojis=['✨','🔥','💫','⚡','🌟','💎','🦋','🌺'];
  const re=[];
  re.push('𝗕𝗼𝗹𝗱: '+toStyle(t,0x1D5D4));
  re.push('𝘐𝘵𝘢𝘭𝘪𝘤: '+toStyle(t,0x1D608));
  re.push('𝙼𝚘𝚗𝚘: '+toStyle(t,0x1D670));
  re.push('Spaced: '+t.split('').join(' '));
  re.push('Dotted: '+t.split('').join('•'));
  re.push('Emoji: '+t.split('').map((c,i)=>c+emojis[i%emojis.length]).join(''));
  re.push('Stars: ★'+t.split('').join('★')+'★');
  re.push('Bracket: 【'+t.split('').join('】【')+'】');
  re.push('Hearts: ♡'+t+'♡');
  re.push('Fire: 🔥'+t+'🔥');
  document.getElementById('out').innerText=re.join('\n');
}
</script></body></html>
