<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Comment Generator</title><link rel="stylesheet" href="style.css"></head><body>
<div class="tool-page">
<h1>😂 Comment Generator</h1>
<label>Category</label>
<select id="cat"><option>Funny</option><option>Compliment</option><option>Savage</option><option>Motivational</option><option>Random</option></select>
<div class="btn-row"><button class="btn" onclick="gen()">Generate</button><button class="btn btn-back" onclick="location.href='index.html'">← Back</button></div>
<div class="output" id="out"></div>
<button class="btn btn-copy btn-sm" onclick="copyText('out')" style="margin-top:8px">Copy</button>
</div>
<script src="script.js"></script>
<script>
const comments={
Funny:["Bro woke up and chose comedy 😂","This is so me at 3am 💀","My last brain cell left the chat 🧠","I showed this to my mom, she blocked me 😭","This hits different when you're eating 🍕","Sir this is a Wendy's 😂","My WiFi is faster than my life decisions","POV: you have zero chill 😎"],
Compliment:["This is absolutely stunning! 🔥","You always nail it! 💯","Incredible work, keep going! 🚀","This made my day better ✨","You're so talented! 💎","Goals! Absolute goals! 🎯","The effort shows, amazing! 🌟","Pure perfection 👑"],
Savage:["Not everyone has taste, and that's okay 💅","Cool story, tell it again never 🙄","I'd agree but then we'd both be wrong 😏","The audacity is unmatched 💀","Some of y'all need a reality check 🪞","I'm not arguing, I'm just explaining why I'm right 😎","Delete this and try again bestie 💕","Main character? More like background extra 🎬"],
Motivational:["Keep pushing, greatness awaits! 💪","Your future self will thank you 🚀","Every expert was once a beginner 🌱","Progress > Perfection ✨","You got this! 🔥","One step at a time 🏔️","Believe in the process 📈","Hard work beats talent 💎"],
Random:["Is cereal a soup? 🤔","Plot twist: nobody asked 😂","This energy is unmatched 🔥","Commenting for the algorithm 📈","First! ...oh wait 😅","Alexa, play Despacito 🎵","Task failed successfully ✅","This is the content I signed up for 💯"]
};
function gen(){const c=document.getElementById('cat').value;const a=comments[c];document.getElementById('out').innerText=a[Math.floor(Math.random()*a.length)]}
</script></body></html>
