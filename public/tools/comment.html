<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Comment Generator</title><link rel="stylesheet" href="style.css"></head><body>
<div class="tool-page">
<h1>😂 Comment Generator</h1>
<label>Category</label>
<select id="cat"><option>Funny</option><option>Compliment</option><option>Savage</option><option>Motivational</option><option>Random</option></select>
<div class="btn-row"><button class="btn" onclick="gen()">Generate</button><button class="btn btn-back" onclick="location.href='index.html'">← Back</button></div>
<div class="output" id="out"></div>
<button class="btn btn-copy btn-sm" onclick="copyText('out')" style="margin-top:8px">Copy</button>
</div>
<script src="ai-engine.js"></script>
<script>
const comments={
Funny:["Bro woke up and chose comedy 😂","This is so me at 3am 💀","My last brain cell left the chat 🧠","I showed this to my mom, she blocked me 😭"],
Compliment:["This is absolutely stunning! 🔥","You always nail it! 💯","Incredible work, keep going! 🚀","This made my day better ✨"],
Savage:["Not everyone has taste, and that's okay 💅","Cool story, tell it again never 🙄","I'd agree but then we'd both be wrong 😏","The audacity is unmatched 💀"],
Motivational:["Keep pushing, greatness awaits! 💪","Your future self will thank you 🚀","Every expert was once a beginner 🌱","Progress > Perfection ✨"],
Random:["Is cereal a soup? 🤔","Plot twist: nobody asked 😂","This energy is unmatched 🔥","Commenting for the algorithm 📈"]
};
async function gen(){
  const c=document.getElementById('cat').value;
  if(isAIEnabled()){
    showLoading('out');
    try{
      const r=await callAI(`Generate 3 unique, witty "${c}" social media comments with emojis. One per line. No numbering.`);
      document.getElementById('out').innerText=r.trim();
    }catch(e){showError('out');const a=comments[c];document.getElementById('out').innerText=a[Math.floor(Math.random()*a.length)]}
  }else{
    const a=comments[c];document.getElementById('out').innerText=a[Math.floor(Math.random()*a.length)];
  }
}
</script></body></html>
