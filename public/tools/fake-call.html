<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fake Call Screen</title><link rel="stylesheet" href="style.css"></head><body>
<div class="tool-page">
<h1>📞 Fake Call Screen</h1>
<label>Caller Name</label><input type="text" id="caller" placeholder="e.g. Mom">
<label>Caller Number</label><input type="text" id="number" placeholder="e.g. +880 1234567890">
<div class="btn-row"><button class="btn" onclick="showCall()">Simulate Call</button><button class="btn btn-back" onclick="location.href='index.html'">← Back</button></div>
<div id="callUI" style="display:none">
<div class="call-screen">
<div class="avatar">📱</div>
<div style="color:#888;font-size:.8rem" id="numDisplay"></div>
<div class="caller" id="callerDisplay"></div>
<div class="status" id="callStatus">Incoming Call...</div>
<div id="aiMsg" style="color:#00ffcc;font-size:.8rem;margin-bottom:10px;min-height:20px"></div>
<div class="call-btns">
<button class="call-btn reject" onclick="reject()">✕</button>
<button class="call-btn accept" onclick="accept()">✓</button>
</div>
</div>
</div>
</div>
<script src="ai-engine.js"></script>
<script>
let timer;
async function showCall(){
  const c=document.getElementById('caller').value.trim()||'Unknown';
  const num=document.getElementById('number').value.trim()||'';
  document.getElementById('callerDisplay').textContent=c;
  document.getElementById('numDisplay').textContent=num;
  document.getElementById('callStatus').textContent='Incoming Call...';
  document.getElementById('aiMsg').textContent='';
  document.getElementById('callUI').style.display='block';
  if(timer)clearInterval(timer);
  if(isAIEnabled()){
    try{
      const r=await callAI(`Someone named "${c}" is calling. Write a funny one-liner caller ID note (like a phone would show). Max 15 words. Be witty.`);
      document.getElementById('aiMsg').textContent=r.trim();
    }catch(e){}
  }
}
function accept(){
  let s=0;
  document.getElementById('callStatus').textContent='Connected 00:00';
  timer=setInterval(()=>{s++;const m=String(Math.floor(s/60)).padStart(2,'0');const ss=String(s%60).padStart(2,'0');document.getElementById('callStatus').textContent='Connected '+m+':'+ss},1000);
}
function reject(){if(timer)clearInterval(timer);document.getElementById('callStatus').textContent='Call Ended';setTimeout(()=>document.getElementById('callUI').style.display='none',1500)}
</script></body></html>
