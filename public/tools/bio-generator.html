<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bio Generator</title><link rel="stylesheet" href="style.css"></head><body>
<div class="tool-page">
<h1>📝 Bio Generator</h1>
<label>Category</label>
<select id="cat"><option>Cool</option><option>Attitude</option><option>Love</option><option>Funny</option><option>Motivational</option></select>
<div class="btn-row"><button class="btn" onclick="gen()">Generate Bio</button><button class="btn btn-back" onclick="location.href='index.html'">← Back</button></div>
<div class="output" id="out"></div>
<button class="btn btn-copy btn-sm" onclick="copyText('out')" style="margin-top:8px">Copy</button>
</div>
<script src="ai-engine.js"></script>
<script>
const bios={
Cool:["🔥 Born to stand out","⚡ Living my best life","🌟 Limited edition","💎 Rare breed","🎯 Focus on the goal","🖤 Silent but deadly","🏆 Winner mentality","👑 King of my world"],
Attitude:["😎 I don't compete, I dominate","🚫 Not for everyone","💪 Built different","🔥 Too hot to handle","👊 Mess with me & learn","🖤 Cold outside, fire inside","⚡ Unstoppable force","🎭 Many faces, one soul"],
Love:["❤️ Hopeless romantic","💕 Love is everything","🌹 Taken & grateful","💘 My heart is full","💑 Better together","🦋 You give me butterflies","💖 Love wins always","🥰 Smiling because of you"],
Funny:["🍕 Running on pizza & Wi-Fi","😂 Professional overthinker","🛋️ Couch potato champion","🤷 I put the 'pro' in procrastinate","🎮 Gaming > Adulting","🤪 Weird & proud","😴 Sleeping is my cardio","🧠 Big brain, zero motivation"],
Motivational:["🚀 Dream big, work hard","🌅 New day, new chance","💡 Be the change","📈 Growth mindset","🎯 Stay focused, stay humble","⭐ Your only limit is you","🔑 Success is a journey","🏔️ Keep climbing"]
};
async function gen(){
  const c=document.getElementById('cat').value;
  if(isAIEnabled()){
    showLoading('out');
    try{
      const r=await callAI(`Generate 3 unique, creative, short social media bios for the "${c}" category. Use emojis. One per line. No numbering.`);
      document.getElementById('out').innerText=r.trim();
    }catch(e){showError('out');const a=bios[c];document.getElementById('out').innerText=a[Math.floor(Math.random()*a.length)]}
  }else{
    const a=bios[c];document.getElementById('out').innerText=a[Math.floor(Math.random()*a.length)];
  }
}
</script></body></html>
