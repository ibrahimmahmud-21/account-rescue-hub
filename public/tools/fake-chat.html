<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fake Chat Generator</title><link rel="stylesheet" href="style.css"></head><body>
<div class="tool-page">
<h1>💬 Fake Chat Generator</h1>
<label>Sender Name</label><input type="text" id="sender" placeholder="e.g. Ali">
<label>Your Name</label><input type="text" id="receiver" placeholder="e.g. Ibrahim">
<label>Message (sender)</label><input type="text" id="msgS" placeholder="Hey, how are you?">
<label>Reply (you)</label><input type="text" id="msgR" placeholder="I'm good!">
<div class="btn-row">
  <button class="btn" onclick="addChat()">Add Messages</button>
  <button class="btn" onclick="suggestAI()" id="suggestBtn" style="background:#222;color:#00ffcc;border:1px solid #00ffcc44">🤖 AI Suggest</button>
  <button class="btn btn-copy" onclick="clearChat()">Clear</button>
  <button class="btn btn-back" onclick="location.href='index.html'">← Back</button>
</div>
<div class="chat-box" id="chatBox"></div>
</div>
<script src="ai-engine.js"></script>
<script>
function addChat(){
  const s=document.getElementById('sender').value.trim()||'Sender';
  const r=document.getElementById('receiver').value.trim()||'You';
  const ms=document.getElementById('msgS').value.trim();
  const mr=document.getElementById('msgR').value.trim();
  const box=document.getElementById('chatBox');
  if(ms){box.innerHTML+=`<div class="chat-msg recv"><div class="name">${s}</div>${ms}</div>`}
  if(mr){box.innerHTML+=`<div class="chat-msg sent"><div class="name">${r}</div>${mr}</div>`}
  document.getElementById('msgS').value='';document.getElementById('msgR').value='';
  box.scrollTop=box.scrollHeight;
}
function clearChat(){document.getElementById('chatBox').innerHTML=''}
async function suggestAI(){
  if(!isAIEnabled()){alert('Turn on AI toggle first!');return}
  const s=document.getElementById('sender').value.trim()||'Friend';
  const r=document.getElementById('receiver').value.trim()||'You';
  const existing=document.getElementById('chatBox').innerText;
  document.getElementById('suggestBtn').textContent='⏳ Thinking...';
  try{
    const res=await callAI(`Generate a short funny chat conversation (4 messages) between "${s}" and "${r}". Format each line as: Name: message. Context: ${existing||'starting a new chat'}`);
    const lines=res.trim().split('\n').filter(l=>l.trim());
    const box=document.getElementById('chatBox');
    lines.forEach(l=>{
      const isSender=l.toLowerCase().startsWith(s.toLowerCase());
      const msg=l.replace(/^[^:]+:\s*/,'');
      const name=isSender?s:r;
      box.innerHTML+=`<div class="chat-msg ${isSender?'recv':'sent'}"><div class="name">${name}</div>${msg}</div>`;
    });
    box.scrollTop=box.scrollHeight;
  }catch(e){alert('AI error, try again')}
  document.getElementById('suggestBtn').textContent='🤖 AI Suggest';
}
</script></body></html>
