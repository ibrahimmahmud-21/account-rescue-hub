<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Name Style Generator</title><link rel="stylesheet" href="../style.css"></head><body>
<div class="tool-page">
<h1>✏️ Name Style Generator</h1>
<label>Enter your name</label>
<input type="text" id="nameIn" placeholder="e.g. Ibrahim">
<div class="btn-row"><button class="btn" onclick="generate()">Generate Styles</button><button class="btn btn-back" onclick="location.href='../index.html'">← Back</button></div>
<div class="output" id="out"></div>
<button class="btn btn-copy btn-sm" onclick="copyText('out')" style="margin-top:8px">Copy</button>
</div>
<script src="../script.js"></script>
<script>
function generate(){
  const n=document.getElementById('nameIn').value.trim();
  if(!n){alert('Enter a name');return}
  const styles=[
    n.split('').join('᭄'),
    '꧁☬'+n+'☬꧂',
    '【'+n+'】',
    '★彡'+n+'彡★',
    '☠'+n+'☠',
    n.split('').join(' '),
    '᚛'+n+'᚜',
    '⚡'+n+'⚡',
    '✿'+n+'✿',
    '〖'+n+'〗',
    '♛'+n+'♛',
    '☯'+n+'☯',
    n.toUpperCase().split('').map(c=>{const o=c.charCodeAt(0);return o>=65&&o<=90?String.fromCodePoint(o-65+0x1D5D4):c}).join(''),
    n.split('').map(c=>{const o=c.toLowerCase().charCodeAt(0);return o>=97&&o<=122?String.fromCodePoint(o-97+0x24B6):c}).join(''),
  ];
  document.getElementById('out').innerText=styles.join('\n');
}
</script></body></html>
